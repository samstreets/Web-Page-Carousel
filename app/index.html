<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Page Carousel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    iframe.active {
      opacity: 1;
      pointer-events: all;
    }
    #overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #0ff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-family: monospace;
      z-index: 9999;
      border: 1px solid rgba(0,255,255,0.3);
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #0ff;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <div id="progress"></div>

  <script src="/config.js"></script>
  <script>
    const CONFIG = window.CAROUSEL_CONFIG || { pages: ["https://example.com"], interval: 30 };
    const pages = CONFIG.pages;
    const intervalMs = (parseInt(CONFIG.interval) || 30) * 1000;

    const overlay = document.getElementById('overlay');
    const progress = document.getElementById('progress');

    const frames = pages.map(url => {
      const f = document.createElement('iframe');
      f.src = '/proxy/?url=' + encodeURIComponent(url);
      document.body.appendChild(f);
      return f;
    });

    let current = 0;
    let startTime = null;
    let rafId = null;

    function showPage(index) {
      frames.forEach((f, i) => f.classList.toggle('active', i === index));
      const url = pages[index];
      overlay.textContent = `${index + 1} / ${pages.length} — ${url}`;
      overlay.style.opacity = '1';
      setTimeout(() => overlay.style.opacity = '0', 3000);
      startTime = performance.now();
      animateProgress();
    }

    function animateProgress() {
      if (rafId) cancelAnimationFrame(rafId);
      function tick() {
        const pct = Math.min((performance.now() - startTime) / intervalMs * 100, 100);
        progress.style.width = pct + '%';
        if (pct < 100) rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    function keepAwake() {
      const canvas = document.createElement('canvas');
      canvas.width = 1; canvas.height = 1;
      canvas.style.cssText = 'position:fixed;top:0;left:0;opacity:0.001;pointer-events:none;z-index:-1';
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      setInterval(() => {
        ctx.fillStyle = `rgb(${Math.floor(Math.random() * 2)},0,0)`;
        ctx.fillRect(0, 0, 1, 1);
      }, 30000);
      if ('wakeLock' in navigator) {
        const lock = () => navigator.wakeLock.request('screen').catch(() => {});
        lock();
        document.addEventListener('visibilitychange', () => { if (!document.hidden) lock(); });
      }
    }

    keepAwake();
    showPage(0);
    setInterval(() => {
      current = (current + 1) % pages.length;
      showPage(current);
    }, intervalMs);
  </script>
</body>
</html>
